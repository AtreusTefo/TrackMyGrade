<div class="register-container">
  <div class="register-card">
    <h2>Teacher Registration</h2>
    
    <div *ngIf="serverErrors.length > 0" class="error-banner">
      <ul>
        <li *ngFor="let error of serverErrors">{{ error }}</li>
      </ul>
    </div>

    <form (ngSubmit)="onSubmit()" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name:</label>
          <input
            type="text"
            id="firstName"
            [(ngModel)]="firstName"
            name="firstName"
            placeholder="First name"
            autocomplete="given-name"
            [class.input-error]="fieldErrors['firstName']"
            (keydown)="filterLetters($event)"
            (input)="validateField('firstName')"
            (blur)="validateField('firstName')">
          <span class="field-error" *ngIf="fieldErrors['firstName']">{{ fieldErrors['firstName'] }}</span>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name:</label>
          <input
            type="text"
            id="lastName"
            [(ngModel)]="lastName"
            name="lastName"
            placeholder="Last name"
            autocomplete="family-name"
            [class.input-error]="fieldErrors['lastName']"
            (keydown)="filterLetters($event)"
            (input)="validateField('lastName')"
            (blur)="validateField('lastName')">
          <span class="field-error" *ngIf="fieldErrors['lastName']">{{ fieldErrors['lastName'] }}</span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          [class.input-error]="fieldErrors['email']"
          (input)="validateField('email')"
          (blur)="validateField('email')">
        <span class="field-error" *ngIf="fieldErrors['email']">{{ fieldErrors['email'] }}</span>
      </div>

      <div class="form-group">
        <label for="phone">Phone:</label>
        <input
          type="tel"
          id="phone"
          [(ngModel)]="phone"
          name="phone"
          placeholder="8 digits"
          autocomplete="tel"
          maxlength="8"
          [class.input-error]="fieldErrors['phone']"
          (keydown)="filterDigits($event)"
          (input)="validateField('phone')"
          (blur)="validateField('phone')">
        <span class="field-error" *ngIf="fieldErrors['phone']">{{ fieldErrors['phone'] }}</span>
      </div>

      <div class="form-group">
        <label for="subject">Subject:</label>
        <input
          type="text"
          id="subject"
          [(ngModel)]="subject"
          name="subject"
          placeholder="e.g., Mathematics"
          autocomplete="off"
          [class.input-error]="fieldErrors['subject']"
          (input)="validateField('subject')"
          (blur)="validateField('subject')">
        <span class="field-error" *ngIf="fieldErrors['subject']">{{ fieldErrors['subject'] }}</span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password:</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              [(ngModel)]="password"
              name="password"
              placeholder="6-20 characters"
              autocomplete="new-password"
              [class.input-error]="fieldErrors['password']"
              (input)="validateField('password')"
              (blur)="validateField('password')">
            <button type="button" class="toggle-password" (click)="showPassword = !showPassword" tabindex="-1">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <span class="field-error" *ngIf="fieldErrors['password']">{{ fieldErrors['password'] }}</span>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password:</label>
          <div class="password-wrapper">
            <input
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Confirm password"
              autocomplete="new-password"
              [class.input-error]="fieldErrors['confirmPassword']"
              (input)="validateField('confirmPassword')"
              (blur)="validateField('confirmPassword')">
            <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword" tabindex="-1">
              {{ showConfirmPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <span class="field-error" *ngIf="fieldErrors['confirmPassword']">{{ fieldErrors['confirmPassword'] }}</span>
        </div>
      </div>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Login here</a>
    </p>
  </div>
</div>

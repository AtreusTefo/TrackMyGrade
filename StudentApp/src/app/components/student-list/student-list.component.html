<div class="container">
  <div class="header">
    <h1>Students</h1>
    <a routerLink="/create" class="btn btn-primary">Add Student</a>
  </div>

  <div *ngIf="errors.length > 0" class="error-banner">
    <ul>
      <li *ngFor="let error of errors">{{ error }}</li>
    </ul>
  </div>

  <div *ngIf="isLoading" class="loading">
    Loading students...
  </div>

  <div *ngIf="!isLoading" class="table-container">
    <table #studentsTable class="students-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let student of students">
          <td>{{ student.id }}</td>
          <td>{{ student.firstName }}</td>
          <td>{{ student.lastName }}</td>
          <td class="actions-cell">
            <a [routerLink]="['/detail', student.id]" class="btn btn-info">View</a>
            <a [routerLink]="['/edit', student.id]" class="btn btn-warning">Edit</a>
            <button (click)="deleteStudent(student.id, student.firstName, student.lastName)" class="btn btn-danger">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
